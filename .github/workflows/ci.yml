name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: better-media-test
          POSTGRES_USER: better-media
          POSTGRES_PASSWORD: better-media
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run build
        env:
          DATABASE_URL: postgresql://better-media:better-media@localhost:5432/better-media-test
          JWT_SECRET: test-jwt-secret-for-ci
          STRIPE_SECRET_KEY: sk_test_placeholder
          IMAGEKIT_PUBLIC_KEY: placeholder
          IMAGEKIT_PRIVATE_KEY: placeholder
          IMAGEKIT_URL_ENDPOINT: https://ik.imagekit.io/placeholder
